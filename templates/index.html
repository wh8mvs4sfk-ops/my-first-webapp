<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的数据看板</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 引入 Bootstrap 的 JS 文件，用于控制弹出层 -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="bg-light pb-5">

<div class="container mt-4">
    <h3 class="text-center mb-4 fw-bold text-secondary">个人开支数据看板</h3>
    
    <div class="row">
        <!-- 左侧区域：图表 -->
        <div class="col-md-4 mb-4">
            <div class="card text-white bg-dark shadow-sm mb-4">
                <div class="card-body text-center py-4">
                    <h6 class="card-title text-muted mb-2">本月累计支出</h6>
                    <h2 class="display-5 fw-bold mb-0">¥ {{ "%.2f"|format(total) }}</h2>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <h6 class="card-title text-center mb-3">🍩 支出比例构成</h6>
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>
        </div>

        <!-- 右侧区域：表单与记录 -->
        <div class="col-md-8">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <form action="/add" method="POST" class="row g-2 align-items-center">
                        <div class="col-md-3">
                            <input type="number" class="form-control" name="amount" placeholder="金额" required step="0.01">
                        </div>
                        
                        <!-- 【升级】动态下拉菜单 + 自定义按钮 -->
                        <div class="col-md-4 d-flex">
                            <select class="form-select me-1" name="category" required>
                                <option value="" disabled selected>选择分类...</option>
                                <!-- 循环读取数据库里的分类 -->
                                {% for cat in categories %}
                                    <option value="{{ cat }}">{{ cat }}</option>
                                {% endfor %}
                            </select>
                            <!-- 触发新增分类弹窗的按钮 -->
                            <button type="button" class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#addCategoryModal">+</button>
                        </div>
                        
                        <div class="col-md-3">
                            <input type="text" class="form-control" name="note" placeholder="备注 (如: 猫粮)">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100 fw-bold">入账</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-3">时间</th>
                                    <th>分类</th>
                                    <th>备注</th>
                                    <th class="text-end">金额</th>
                                    <th class="text-center pe-3">操作</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for row in records %}
                                <tr>
                                    <td class="text-muted small ps-3">{{ row[4] }}</td>
                                    <td><span class="badge bg-secondary">{{ row[2] }}</span></td>
                                    <td>{{ row[3] }}</td>
                                    <td class="text-end fw-bold text-danger">-¥{{ "%.2f"|format(row[1]) }}</td>
                                    <td class="text-center pe-3">
                                        <a href="/delete/{{ row[0] }}" class="btn btn-sm btn-outline-danger" onclick="return confirm('确定要删除这笔记录吗？')">删除</a>
                                    </td>
                                </tr>
                                {% else %}
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-5">暂无记录，开启记账之旅吧！</td>
                                </tr>
                                {% endfor %}
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 【新组件】新增分类的弹窗 (Modal) -->
<div class="modal fade" id="addCategoryModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-sm modal-dialog-centered">
    <div class="modal-content">
      <form action="/add_category" method="POST">
          <div class="modal-header">
            <h5 class="modal-title fs-6">➕ 添加新分类</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="text" class="form-control" name="new_category" placeholder="例如：电子产品" required>
          </div>
          <div class="modal-footer p-1">
            <button type="submit" class="btn btn-primary btn-sm w-100">确认添加</button>
          </div>
      </form>
    </div>
  </div>
</div>

<script>
    const chartLabels = {{ chart_labels | safe }};
    const chartValues = {{ chart_values | safe }};

    if (chartValues.length > 0) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: chartLabels,
                datasets: [{
                    data: chartValues,
                    backgroundColor: ['#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', '#9966FF', '#FF9F40', '#EA3F3F'],
                    borderWidth: 0
                }]
            },
            options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
        });
    }
</script>

</body>
</html>
